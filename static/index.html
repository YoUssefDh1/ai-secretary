<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Receptionist - Voice Demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      max-width: 640px; margin: 0 auto; padding: 24px;
      background: #0f172a; color: #e2e8f0;
    }
    h1 { font-size: 1.4rem; font-weight: 600; }
    .sub { color: #94a3b8; font-size: 0.9rem; margin-top: -8px; }
    #log {
      background: #1e293b; border-radius: 12px; padding: 16px;
      min-height: 240px; margin: 16px 0; line-height: 1.5;
    }
    .turn { margin: 10px 0; }
    .who { font-weight: 600; font-size: 0.8rem; text-transform: uppercase;
           letter-spacing: 0.04em; }
    .you .who { color: #38bdf8; }
    .sara .who { color: #4ade80; }
    .text { margin-top: 2px; }
    .controls { display: flex; gap: 12px; }
    button {
      flex: 1; padding: 16px; border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 600; cursor: pointer; color: #0f172a;
    }
    #startBtn { background: #4ade80; }
    #talkBtn { background: #38bdf8; }
    #talkBtn.recording { background: #f87171; color: #fff; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .status { color: #94a3b8; font-size: 0.85rem; min-height: 1.2em;
              margin-top: 10px; text-align: center; }
  </style>
</head>
<body>
  <h1>AI Receptionist - Voice Demo</h1>
  <p class="sub">Click "Start call", then tap to speak. Fully local: Whisper + gemma2 + Piper.</p>

  <div id="log"></div>

  <div class="controls">
    <button id="startBtn">Start call</button>
    <button id="talkBtn" disabled>Tap to speak</button>
  </div>
  <div class="status" id="status"></div>

  <script>
    const log = document.getElementById('log');
    const startBtn = document.getElementById('startBtn');
    const talkBtn = document.getElementById('talkBtn');
    const status = document.getElementById('status');

    let mediaRecorder = null;
    let chunks = [];
    let recording = false;

    function addTurn(who, cls, text) {
      const div = document.createElement('div');
      div.className = 'turn ' + cls;
      div.innerHTML = '<div class="who">' + who + '</div><div class="text"></div>';
      div.querySelector('.text').textContent = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    function play(b64) {
      return new Promise((resolve) => {
        const audio = new Audio('data:audio/wav;base64,' + b64);
        audio.onended = resolve;
        audio.play().catch(resolve);
      });
    }

    startBtn.onclick = async () => {
      startBtn.disabled = true;
      status.textContent = 'Connecting...';
      try {
        const res = await fetch('/greeting', { method: 'POST' });
        const data = await res.json();
        addTurn('Sara', 'sara', data.reply);
        talkBtn.disabled = false;
        status.textContent = '';
        await play(data.audio);
      } catch (e) {
        status.textContent = 'Error: ' + e.message;
        startBtn.disabled = false;
      }
    };

    talkBtn.onclick = async () => {
      if (!recording) {
        // Start recording
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        chunks = [];
        mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
        mediaRecorder.onstop = sendAudio;
        mediaRecorder.start();
        recording = true;
        talkBtn.textContent = 'Stop & send';
        talkBtn.classList.add('recording');
        status.textContent = 'Listening...';
      } else {
        // Stop recording
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach((t) => t.stop());
        recording = false;
        talkBtn.textContent = 'Tap to speak';
        talkBtn.classList.remove('recording');
        status.textContent = 'Thinking...';
        talkBtn.disabled = true;
      }
    };

    async function sendAudio() {
      const blob = new Blob(chunks, { type: 'audio/webm' });
      const form = new FormData();
      form.append('audio', blob, 'speech.webm');
      try {
        const res = await fetch('/voice', { method: 'POST', body: form });
        const data = await res.json();
        if (data.transcript) addTurn('You', 'you', data.transcript);
        addTurn('Sara', 'sara', data.reply);
        status.textContent = '';
        talkBtn.disabled = false;
        await play(data.audio);
      } catch (e) {
        status.textContent = 'Error: ' + e.message;
        talkBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
